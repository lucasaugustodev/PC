<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faster Whisper - Transcritor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-top: 40px;
    font-size: 28px;
    font-weight: 300;
    color: #fff;
  }
  h1 span { color: #4fc3f7; font-weight: 600; }
  .subtitle {
    color: #666;
    font-size: 14px;
    margin-top: 6px;
  }
  .controls {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #recordBtn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  #recordBtn:hover { border-color: #4fc3f7; background: #1e2a30; }
  #recordBtn.recording {
    border-color: #ef5350;
    background: #2a1515;
    animation: pulse 1.5s infinite;
  }
  #recordBtn .icon { font-size: 32px; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,83,80,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(239,83,80,0); }
  }
  .status {
    font-size: 14px;
    color: #888;
    min-height: 20px;
  }
  .status.processing { color: #ffd54f; }
  .status.error { color: #ef5350; }
  .status.success { color: #66bb6a; }
  .result-container {
    margin-top: 30px;
    width: 90%;
    max-width: 800px;
    flex: 1;
    padding-bottom: 40px;
  }
  .result-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .result-card .meta {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .result-card .meta .tag {
    background: #1e1e1e;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: #aaa;
  }
  .result-card .meta .tag b { color: #4fc3f7; }
  .result-card .text {
    font-size: 18px;
    line-height: 1.7;
    color: #fff;
    white-space: pre-wrap;
  }
  .segments {
    margin-top: 16px;
    border-top: 1px solid #222;
    padding-top: 16px;
  }
  .segments summary {
    cursor: pointer;
    color: #666;
    font-size: 13px;
  }
  .seg-line {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid #1a1a1a;
  }
  .seg-line .time {
    color: #4fc3f7;
    font-family: monospace;
    font-size: 12px;
    min-width: 120px;
    padding-top: 2px;
  }
  .history-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #444;
    margin-bottom: 12px;
  }
  .timer {
    font-family: monospace;
    font-size: 24px;
    color: #ef5350;
    min-height: 30px;
  }
</style>
</head>
<body>

<h1>Faster <span>Whisper</span></h1>
<p class="subtitle">large-v3 | CUDA GPU | Tempo real</p>

<div class="controls">
  <button id="recordBtn" onclick="toggleRecord()">
    <span class="icon">🎙️</span>
    <span id="btnLabel">Gravar</span>
  </button>
  <div id="timer" class="timer"></div>
  <div id="status" class="status">Clique para gravar</div>
</div>

<div class="result-container">
  <div id="results"></div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let startTime = 0;

async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      sendAudio();
    };

    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('btnLabel').textContent = 'Parar';
    setStatus('Gravando...', '');
    startTimer();
  } catch (err) {
    setStatus('Erro ao acessar microfone: ' + err.message, 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('btnLabel').textContent = 'Gravar';
  stopTimer();
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const sec = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer').textContent = min + ':' + sec;
  }, 200);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '';
}

async function sendAudio() {
  setStatus('Transcrevendo com GPU...', 'processing');
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.error) {
      setStatus('Erro: ' + data.error, 'error');
      return;
    }

    setStatus(`Pronto! ${data.processing_time}s de processamento`, 'success');
    addResult(data);
  } catch (err) {
    setStatus('Erro de conexao: ' + err.message, 'error');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function addResult(data) {
  const container = document.getElementById('results');
  const card = document.createElement('div');
  card.className = 'result-card';

  let segmentsHtml = '';
  if (data.segments && data.segments.length > 0) {
    segmentsHtml = '<div class="segments"><details><summary>Segmentos (' + data.segments.length + ')</summary>';
    data.segments.forEach(s => {
      segmentsHtml += '<div class="seg-line"><span class="time">' + s.start.toFixed(2) + 's → ' + s.end.toFixed(2) + 's</span><span>' + escapeHtml(s.text) + '</span></div>';
    });
    segmentsHtml += '</details></div>';
  }

  const now = new Date().toLocaleTimeString('pt-BR');
  card.innerHTML =
    '<div class="meta">' +
      '<span class="tag">🕐 ' + now + '</span>' +
      '<span class="tag">🌐 <b>' + data.language + '</b> (' + (data.language_probability * 100).toFixed(0) + '%)</span>' +
      '<span class="tag">⏱️ Audio: <b>' + data.duration + 's</b></span>' +
      '<span class="tag">⚡ GPU: <b>' + data.processing_time + 's</b></span>' +
    '</div>' +
    '<div class="text">' + escapeHtml(data.text || '(silencio)') + '</div>' +
    segmentsHtml;

  container.insertBefore(card, container.firstChild);
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
